name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Organize Source Folders for Maven
      run: |
        mkdir -p src/main/java src/test/java
        for dir in Abstraction BDDFirstTestCase ExceptionHndling InhritenceInJava JavaAccessModifiers Page_Object_Model constructorsInJava interfaces java_project; do
          if [ -d "$dir" ]; then
            mv "$dir" src/main/java/
          fi
        done

    - name: Build with Maven
      run: mvn -B clean package
