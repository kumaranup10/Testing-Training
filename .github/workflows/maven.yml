- name: Correctly Structure Maven Folders
      run: |
        mkdir -p src/main/java src/test/java
        
        # Move core packages to src/main/java
        for dir in Abstraction ExceptionHndling InhritenceInJava JavaAccessModifiers Page_Object_Model constructorsInJava interfaces java_project; do
          if [ -d "$dir" ]; then
            mv "$dir" src/main/java/
          fi
        done

        # Move test packages to src/test/java
        if [ -d "BDDFirstTestCase" ]; then
          mv BDDFirstTestCase src/test/java/
        fi
